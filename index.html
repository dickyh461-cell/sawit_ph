```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
}

canvas{
    width:100% !important;
    height:100% !important;
}
</style>
</head>

<body>

<canvas id="chart"></canvas>

<script>

const firebaseURL =
"https://monitoring-sawit-8718b-default-rtdb.asia-southeast1.firebasedatabase.app/MonitoringSawit.json";

let labels = [];
let values = [];

const chart = new Chart(
document.getElementById("chart"),
{
    type:"line",
    data:{
        labels:labels,
        datasets:[{
            label:"pH",
            data:values,
            borderWidth:2,
            tension:0.3
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false
    }
});

async function loadData(){

    const response = await fetch(firebaseURL);
    const data = await response.json();

    labels.push(new Date().toLocaleTimeString());
    values.push(data.ph);

    if(labels.length > 20){
        labels.shift();
        values.shift();
    }

    chart.update();
}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
